site_name: LZR Systems
site_url: https://lzrsystems.com
use_directory_urls: true
theme:
  name: material
  logo: assets/site-logo.svg
  language: en
  
  font: 
    text: Inter
    code: Roboto Mono
  palette: 
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: light blue

        

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.preview
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - toc.follow
    - toc.integrate
    - header.autohide
    - search.suggest
    - search.highlight
    - search.share
    - navigation.indexes
    - tags
    - content.code.copy
    - content.code.select
plugins:
  - search
  - meta
  - social:
      cards_dir: Social-Cards
      cards_layout_options: 
        background_color: "#ffffff"
        color: rgb(9, 186, 206)
  - tags:
        tags_file: Tags.md
        sort: name

nav:
  - Home: index.md
  - Projects: 
      - Projects/index.md
      - Omnifly-H7: Projects/Omnifly-H7.md
      - Telemetrium: Projects/Telemetrium.md
      - USB Hub+: Projects/USB-HUB-PLUS.md
      - YABSPD: Projects/YABSPD.md
      - TeamRadio: Projects/TeamRadio.md
      - IR-Gate: Projects/IR-Gate.md
      - RF Test Board: Projects/RF-Test-Board.md
      - LZR-Card: Projects/LZR-Card.md
      - PD Trigger: Projects/PD-Trigger.md
      - AIODuino: Projects/AIOduino.md
      - NANOPSU: Projects/NANOPSU.md
      - Launchy: Projects/launchy.md
      - BreadboardPSU: Projects/BreadboardPSU.md
      - Sparky: Projects/Sparky.md
      - TinyPSU: Projects/TinyPSU.md
      - Electronic load: Projects/electronic_load.md
      
      
    
    
  - Downloads: Downloads.md
  - Gallery: Gallery.md
  - Tags: Tags.md

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - js/randomGallery.js
  - js/gallery.js


markdown_extensions: 
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
